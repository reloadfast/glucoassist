[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "T20"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "N806"]  # allow assert; TestingSessionLocal naming
"app/api/**/*.py" = ["B008"]  # FastAPI Depends/Query in defaults is idiomatic

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "unit: fast, isolated unit tests",
    "integration: tests requiring external services or the full stack",
]
addopts = "--cov=app --cov-report=term-missing --cov-report=html --cov-fail-under=80"

[tool.bandit]
targets = ["app"]
severity = "high"
confidence = "medium"
