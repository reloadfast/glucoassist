user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /proc/1/fd/2 warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /proc/1/fd/1;

    server_tokens off;
    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/xml image/svg+xml;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options          "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options   "nosniff"                       always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self';"
            always;

        # API → uvicorn
        location /api/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    300s;
        }

        # React SPA — serve index.html for all non-asset routes
        location / {
            root       /app/static;
            index      index.html;
            try_files  $uri $uri/ /index.html;

            # Cache hashed assets aggressively; let index.html stay fresh
            location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
