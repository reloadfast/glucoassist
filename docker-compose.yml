# GlucoAssist — Option B (nightscout-librelink-up sidecar)
#
# This compose file eliminates MongoDB and Nightscout by having
# nightscout-librelink-up push directly to GlucoAssist.
#
# Setup:
#   1. cp .env.example .env && edit .env
#   2. Set CGM_SOURCE=librelink_push in .env
#   3. Fill in LINK_UP_USERNAME, LINK_UP_PASSWORD, LINK_UP_REGION
#   4. docker compose up -d
#
# nightscout-librelink-up will POST readings to GlucoAssist's
# /api/v1/entries endpoint every LINK_UP_INTERVAL minutes.
# Set LINK_UP_ALL_DATA=true on first run to backfill history.

services:
  glucoassist:
    image: talesofthemoon/glucoassist:latest
    container_name: glucoassist
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3500}:80"
    volumes:
      - glucoassist_data:/data
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  librelink-up:
    image: ghcr.io/timoschlueter/nightscout-librelink-up:latest
    container_name: librelink-up
    restart: unless-stopped
    depends_on:
      glucoassist:
        condition: service_healthy
    environment:
      # LibreView credentials
      LINK_UP_USERNAME: ${LINK_UP_USERNAME}
      LINK_UP_PASSWORD: ${LINK_UP_PASSWORD}
      LINK_UP_REGION: ${LINK_UP_REGION:-EU}
      # Poll interval in minutes (default 5)
      LINK_UP_INTERVAL: ${LINK_UP_INTERVAL:-5}
      # Set to true on first run to import full sensor history
      LINK_UP_ALL_DATA: ${LINK_UP_ALL_DATA:-false}
      # Point at GlucoAssist — it speaks the Nightscout API
      NIGHTSCOUT_URL: http://glucoassist
      # No token needed (GlucoAssist accepts unauthenticated pushes on LAN)
      API_SECRET: ""

volumes:
  glucoassist_data:
